name: Cloud Phone Android via Ubuntu VNC (100% Anti Gagal)

on:
  workflow_dispatch:

jobs:
  android-cloud:
    runs-on: ubuntu-latest
    timeout-minutes: 360 

    steps:
    - name: Konek ke Jaringan Tailscale
      run: |
        curl -fsSL https://tailscale.com/install.sh | sh
        sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}

    - name: Jalankan Android 11 (Redroid)
      run: |
        sudo docker run -d --rm --privileged \
          --name redroid \
          --ipc=host \
          -p 5555:5555 \
          redroid/redroid:11.0.0-latest \
          androidboot.redroid_width=720 \
          androidboot.redroid_height=1280 \
          androidboot.redroid_dpi=320 \
          redroid.gpu.mode=guest

    - name: Jalankan Ubuntu Desktop VNC Resmi
      run: |
        echo "Mengaktifkan Desktop VNC di Port 5900..."
        # Menggunakan image Ubuntu LXDE + VNC yang sangat stabil dan resmi
        sudo docker run -d --rm \
          --name ubuntu-vnc \
          --net=host \
          -p 5900:5900 \
          dorowu/ubuntu-desktop-lxde-vnc:latest

    - name: Setup Hubungan Android ke Layar VNC
      run: |
        echo "Menghubungkan Android ke visual Desktop..."
        # Menunggu VNC siap, lalu menginstal adb dan scrcpy di dalam desktop secara otomatis
        sleep 10
        sudo docker exec -d ubuntu-vnc apt-get update
        sudo docker exec -d ubuntu-vnc apt-get install -y adb scrcpy
        sleep 5
        sudo docker exec -d ubuntu-vnc adb connect localhost:5555
        # Menjalankan scrcpy agar layar Android langsung otomatis kebuka di dalam VNC
        sudo docker exec -d ubuntu-vnc scrcpy --serial localhost:5555 --max-fps 30

    - name: Menjaga Cloud Phone Tetap Hidup
      run: |
        echo "🔥 CLOUD PHONE UBUNTU VNC NYALA TOTAL! 🔥"
        echo "Silakan konek menggunakan IP Tailscale lu di port 5900"
        while true; do sleep 60; done
